name: Hexgram
options:
  bundleIdPrefix: com.hexgram
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_KEY_CFBundleDisplayName: "易学"
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.lifestyle"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ASSETCATALOG_COMPILER_APPICON_NAME: "AppIcon"
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: "AccentColor"

targets:
  Hexgram:
    type: application
    platform: iOS
    sources:
      - path: Hexgram
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hexgram.app
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsArbitraryLoads: true
    dependencies:
      - target: HexgramWidgetExtension

  HexgramWidgetExtension:
    type: app-extension
    platform: iOS
    product: HexgramWidgetExtension
    sources:
      - path: HexgramWidget
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hexgram.app.widget
        INFOPLIST_KEY_CFBundleDisplayName: "每日黄历"
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: "com.apple.widgetkit-extension"
        SKIP_INSTALL: true

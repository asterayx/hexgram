<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--g:#c9a96e;--gl:#f5deb3;--gd:#a07840;--bg:#0d0b08;--bg2:#1a1510;--bg3:#13100c;--bd:#3d3425;--tx:#e8dcc8;--t2:#8b7355;--t3:#5a4d3a;--ac:#e8a444;--ft:'Noto Serif SC','Songti SC','SimSun',serif}

.tab{flex:1;padding:10px 0 8px;text-align:center;font-size:11px;color:var(--t2);cursor:pointer;font-family:var(--ft)}
.tab .ico{font-size:22px;display:block;margin-bottom:2px}
.tab.on{color:var(--g)}
.wrap{max-width:600px;margin:0 auto;padding:16px 14px 20px}
.page{display:none}
.page.on{display:block}
.hd{text-align:center;margin-bottom:20px}
.hd-s{font-size:11px;letter-spacing:6px;color:var(--t2);margin-bottom:4px}
.hd h1{font-size:28px;font-weight:400;background:linear-gradient(180deg,var(--gl),var(--g));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hd-l{width:50px;height:1px;background:linear-gradient(90deg,transparent,var(--g),transparent);margin:6px auto}
.inp{width:100%;background:transparent;border:1px solid var(--bd);color:var(--tx);padding:10px 12px;border-radius:8px;font-size:14px;font-family:var(--ft);outline:none}
.inp:focus{border-color:var(--g)}
.inp::placeholder{color:var(--t3)}
.lbl{font-size:11px;color:var(--t2);margin-bottom:3px;display:block}
.row{display:flex;gap:8px;margin-bottom:10px}
.row>*{flex:1;min-width:0}
.btn{padding:12px 20px;border-radius:10px;font-family:var(--ft);font-size:13px;cursor:pointer;border:none}
.btn:active{transform:scale(.96)}
.bp{background:linear-gradient(135deg,var(--g),var(--gd));color:var(--bg);font-size:15px;font-weight:600}
.bg{border:1px solid var(--bd);background:transparent;color:var(--t2)}
.br{display:flex;gap:10px;justify-content:center;margin:14px 0;flex-wrap:wrap}
.pnl{background:rgba(19,16,12,.85);border:1px solid var(--bd);border-radius:14px;padding:16px;margin-bottom:14px}

.rd th,.rd td{border:1px solid var(--bd);padding:4px 6px;text-align:center}

/* Liuyao */

.hl{display:flex;flex-direction:column-reverse;align-items:center}
.yr{display:flex;align-items:center;gap:6px;margin:3px 0;animation:si .3s ease-out both}
@keyframes si{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:translateX(0)}}
.yb{height:8px;border-radius:2px}
.yb.ya{width:min(160px,36vw)}
.yb.yi{width:min(66px,15vw)}

.coin{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600}
.coin.z{background:radial-gradient(circle at 35% 35%,var(--gl),var(--gd));color:#3d2b15}
.coin.b{background:radial-gradient(circle at 35% 35%,var(--t2),#3d2b15);color:var(--g)}
.dots{display:flex;justify-content:center;gap:5px;margin-bottom:4px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--bd)}
.dot.f{background:var(--g)}
.dot.dc{background:var(--ac)}
.sp{width:32px;height:32px;border:2px solid var(--bd);border-top:2px solid var(--g);border-radius:50%;margin:0 auto 12px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* BaZi */
.bz-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:12px 0}
.bz-col{text-align:center;background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:10px 4px}
.bz-h{font-size:10px;color:var(--t2);margin-bottom:6px}
.bz-tg{font-size:22px;color:var(--gl)}
.bz-dz{font-size:22px;color:var(--g);margin-top:2px}
.bz-wx{font-size:10px;color:var(--t2);margin-top:4px}
.bz-me .bz-tg{color:var(--ac);text-decoration:underline;text-underline-offset:4px}
.wx-bar{display:flex;gap:4px;align-items:end;height:50px;margin:8px 0}
.wx-b{flex:1;border-radius:3px 3px 0 0;text-align:center;font-size:10px;color:var(--bg);font-weight:600;min-height:6px}
.wx-l{font-size:10px;color:var(--t2);text-align:center;margin-top:2px}
.dy-row{display:flex;overflow-x:auto;gap:6px;padding:4px 0;margin:8px 0;-webkit-overflow-scrolling:touch}
.dy-item{flex:0 0 60px;text-align:center;padding:8px 4px;border:1px solid var(--bd);border-radius:8px;font-size:11px}
.dy-item.cur{border-color:var(--ac);background:rgba(232,164,68,.08)}
.dy-item .dg{font-size:14px;color:var(--gl)}
.dy-item .da{font-size:9px;color:var(--t3);margin-top:2px}

/* Huangli */
.hl-date{font-size:18px;color:var(--gl);text-align:center;margin:8px 0}
.hl-gz{font-size:30px;text-align:center;color:var(--g);font-weight:500;margin:6px 0}
.hl-sub{font-size:12px;color:var(--t2);text-align:center;margin-bottom:12px}
.hl-yi,.hl-ji{padding:12px;border-radius:10px;margin-bottom:10px}
.hl-yi{background:rgba(76,120,60,.15);border:1px solid rgba(76,120,60,.3)}
.hl-ji{background:rgba(160,60,60,.12);border:1px solid rgba(160,60,60,.25)}
.hl-yi h3{color:#8bc34a;font-size:14px;margin-bottom:6px}
.hl-ji h3{color:#e57373;font-size:14px;margin-bottom:6px}
.hl-yi p,.hl-ji p{font-size:13px;line-height:1.8}
.dir-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:10px 0}
.dir-item{text-align:center;padding:10px 4px;background:var(--bg2);border:1px solid var(--bd);border-radius:8px}
.dir-item .dn{font-size:11px;color:var(--t2);margin-bottom:3px}
.dir-item .dv{font-size:18px;color:var(--gl)}
.dir-item .dd{font-size:11px;color:var(--g);margin-top:2px}
.hl-info{font-size:12px;color:var(--t2);line-height:1.8}

// ══════════════════════════════════
// SHARED: Calendar Calculation
// ══════════════════════════════════
var TG = ["甲","乙","丙","丁","戊","己","庚","辛","壬","癸"];
var DZ = ["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];
var DZ_SX = ["鼠","牛","虎","兔","龙","蛇","马","羊","猴","鸡","狗","猪"];
var WX_T = {甲:"木",乙:"木",丙:"火",丁:"火",戊:"土",己:"土",庚:"金",辛:"金",壬:"水",癸:"水"};
var WX_D = {子:"水",丑:"土",寅:"木",卯:"木",辰:"土",巳:"火",午:"火",未:"土",申:"金",酉:"金",戌:"土",亥:"水"};
var WXS = {木:"火",火:"土",土:"金",金:"水",水:"木"};
var WXK = {木:"土",土:"水",水:"火",火:"金",金:"木"};
var WXCOL = {木:"#66bb6a",火:"#ef5350",土:"#ffa726",金:"#e0e0e0",水:"#42a5f5"};
var CANG = {子:["癸"],丑:["己","癸","辛"],寅:["甲","丙","戊"],卯:["乙"],辰:["戊","乙","癸"],巳:["丙","庚","戊"],午:["丁","己"],未:["己","丁","乙"],申:["庚","壬","戊"],酉:["辛"],戌:["戊","辛","丁"],亥:["壬","甲"]};

function jdn(y, m, d) {
  if (m <= 2) { y--; m += 12; }
  var A = Math.floor(y / 100);
  var B = 2 - A + Math.floor(A / 4);
  return Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + d + B - 1524.5;
}

function riGZ(y, m, d) {
  var j = Math.floor(jdn(y, m, d) + 0.5);
  return { g: TG[((j - 1) % 10 + 10) % 10], z: DZ[((j + 1) % 12 + 12) % 12] };
}

var JQ = [[2,4,"寅"],[3,6,"卯"],[4,5,"辰"],[5,6,"巳"],[6,6,"午"],[7,7,"未"],[8,7,"申"],[9,8,"酉"],[10,8,"戌"],[11,7,"亥"],[12,7,"子"],[1,6,"丑"]];

function yueZhi(y, m, d) {
  for (var i = JQ.length - 1; i >= 0; i--) {
    if (m > JQ[i][0] || (m === JQ[i][0] && d >= JQ[i][1])) return JQ[i][2];
  }
  return "丑";
}

function nianGZ(y, m, d) {
  if (m < 2 || (m === 2 && d < 4)) y--;
  return { g: TG[(y - 4 + 600) % 10], z: DZ[(y - 4 + 600) % 12] };
}

function yueGan(nianG, yueZ) {
  var base = {甲:2,己:2,乙:4,庚:4,丙:6,辛:6,丁:8,壬:8,戊:0,癸:0};
  var off = (DZ.indexOf(yueZ) - 2 + 12) % 12;
  return TG[(base[nianG] + off) % 10];
}

function shiGZ(riG, h) {
  var idx = Math.floor(((h + 1) % 24) / 2);
  var base = {甲:0,己:0,乙:2,庚:2,丙:4,辛:4,丁:6,壬:6,戊:8,癸:8};
  return { g: TG[(base[riG] + idx) % 10], z: DZ[idx] };
}

function shiShen(riG, otherG) {
  var me = WX_T[riG], other = WX_T[otherG];
  var same = TG.indexOf(riG) % 2 === TG.indexOf(otherG) % 2;
  if (me === other) return same ? "比肩" : "劫财";
  if (WXS[me] === other) return same ? "食神" : "伤官";
  if (WXK[me] === other) return same ? "偏财" : "正财";
  if (WXK[other] === me) return same ? "七杀" : "正官";
  if (WXS[other] === me) return same ? "偏印" : "正印";
  return "?";
}

function todayStr() {
  var n = new Date();
  return n.getFullYear() + "-" + String(n.getMonth() + 1).padStart(2, "0") + "-" + String(n.getDate()).padStart(2, "0");
}

var BAGUA = {"111":{n:"乾",wx:"金",ty:"甲",iy:"壬"},"000":{n:"坤",wx:"土",ty:"乙",iy:"癸"},"010":{n:"坎",wx:"水",ty:"戊",iy:"戊"},"101":{n:"离",wx:"火",ty:"己",iy:"己"},"100":{n:"震",wx:"木",ty:"庚",iy:"庚"},"011":{n:"巽",wx:"木",ty:"辛",iy:"辛"},"001":{n:"艮",wx:"土",ty:"丙",iy:"丙"},"110":{n:"兑",wx:"金",ty:"丁",iy:"丁"}};

function gBase(v) { return (v === 7 || v === 9) ? 1 : 0; }

// 八宫表
var _BGT = null;
function getBGT() {
  if (_BGT) return _BGT;
  var pgs = ["111","000","010","101","100","011","001","110"];
  var R = {};
  for (var p = 0; p < pgs.length; p++) {
    var pg = pgs[p];
    var gn = BAGUA[pg].n;
    var b = pg.split("").map(Number);
    var c = b.concat(b);
    R[c.join("")] = {gong:gn, shi:5, ying:2};
    for (var i = 0; i < 5; i++) {
      var cur = b.concat(b);
      for (var j = 0; j <= i; j++) cur[j] = 1 - cur[j];
      R[cur.join("")] = {gong:gn, shi:i, ying:(i+3)%6};
    }
    var y = b.concat(b);
    for (var j = 0; j < 5; j++) y[j] = 1 - y[j];
    y[3] = 1 - y[3];
    R[y.join("")] = {gong:gn, shi:3, ying:0, yh:true};
    var g = y.slice();
    g[0] = b[0]; g[1] = b[1]; g[2] = b[2];
    R[g.join("")] = {gong:gn, shi:2, ying:5, gh:true};
  }
  _BGT = R;
  return R;
}

function lyUpdateGZ() {
  var v = document.getElementById("ly_date").value;
  if (!v) return;
  var parts = v.split("-").map(Number);
  var r = riGZ(parts[0], parts[1], parts[2]);
  var yz = yueZhi(parts[0], parts[1], parts[2]);
  var ng = nianGZ(parts[0], parts[1], parts[2]);
  var yg = yueGan(ng.g, yz);
  document.getElementById("ly_gz").textContent = "日柱" + r.g + r.z + "　月建" + yg + yz;
  window._rg = r.g; window._rz = r.z; window._yz = yz;
}

function lyRender() {
  var bb = lyLines.map(gBase);
  var cb = lyLines.map(gChg);
  var hc = lyLines.some(isDong);
  var cp = [];
  lyLines.forEach(function(v, i) { if (isDong(v)) cp.push(i); });

  document.getElementById("ly_inp").style.display = lyPhase === "input" ? "block" : "none";
  document.getElementById("ly_empty").style.display = (lyLines.length === 0 && !lyTossing) ? "block" : "none";

  var hl = document.getElementById("ly_lines");
  hl.innerHTML = "";
  lyLines.forEach(function(v, i) {
    var isYang = gBase(v) === 1;
    var ch = isDong(v);
    var bc = ch ? "ch" : "st";
    var lineHtml;
    if (isYang) {
      lineHtml = '<div class="yli" style="display:flex;position:relative"><div class="yb ya ' + bc + '"></div>' + (ch ? '<span class="ym" style="position:absolute;right:-16px;top:-4px;font-size:13px;color:var(--ac)">○</span>' : '') + '</div>';
    } else {
      lineHtml = '<div class="yli" style="display:flex;gap:10px;position:relative"><div class="yb yi ' + bc + '"></div><div class="yb yi ' + bc + '"></div>' + (ch ? '<span class="ym" style="position:absolute;right:-16px;top:-4px;font-size:13px;color:var(--ac)">×</span>' : '') + '</div>';
    }
    var row = document.createElement("div");
    row.className = "yr";
    row.style.animationDelay = (i * 0.05) + "s";
    row.innerHTML = '<span style="font-size:10px;color:var(--t2);width:14px;text-align:right">' + YP[i] + '</span>' + lineHtml + '<span style="font-size:9px;width:32px;color:' + (ch ? 'var(--ac)' : 'var(--t3)') + '">' + YL[v] + '</span>';
    hl.appendChild(row);
  });

  var info = document.getElementById("ly_info");
  if (lyLines.length === 6) {
    info.style.display = "block";
    var bk = bb.join("");
    var ck = cb.join("");
    var h = '<div style="font-size:22px;color:var(--gl)">' + (HT[bk] || "?") + '卦</div>';
    h += '<div style="font-size:11px;color:var(--t2);margin-top:2px">' + (BAGUA[bk.slice(3,6)] ? BAGUA[bk.slice(3,6)].n : "") + '上·' + (BAGUA[bk.slice(0,3)] ? BAGUA[bk.slice(0,3)].n : "") + '下</div>';
    if (hc) h += '<div style="font-size:11px;color:var(--ac);margin-top:4px">→ 变卦：' + (HT[ck] || "?") + '（' + cp.map(function(i){return YP[i]+"爻";}).join("、") + '动）</div>';
    info.innerHTML = h;
  } else {
    info.style.display = "none";
  }

  // Dots
  var dotsHtml = "";
  for (var i = 0; i < 6; i++) {
    var cls = "dot";
    if (i < lyLines.length) cls += isDong(lyLines[i]) ? " dc" : " f";
    dotsHtml += '<div class="' + cls + '"></div>';
  }
  document.getElementById("ly_dots").innerHTML = dotsHtml;
  document.getElementById("ly_pg").textContent = lyLines.length < 6 ? "第" + YP[lyLines.length] + "爻（" + lyLines.length + "/6）" : "卦象已成";

  // Buttons
  var ba = document.getElementById("ly_btns");
  ba.innerHTML = "";
  if (lyPhase === "input") {
    if (lyLines.length < 6) {
      ba.innerHTML = '<button class="btn" id="tB" style="flex:1;max-width:200px;padding:13px 0;border:1px solid var(--g);background:linear-gradient(135deg,#2a2318,var(--bg2));color:var(--gl);font-size:16px;font-family:var(--ft)"' + (lyTossing ? ' disabled' : '') + '>' + (lyTossing ? '摇卦中…' : '🪙 摇卦') + '</button>' + (lyLines.length > 0 ? '<button class="btn bg" onclick="lyUndo()">撤回</button>' : '');
      var tb = document.getElementById("tB");
      if (tb && !lyTossing) tb.onclick = lyDoToss;
    } else {
      ba.innerHTML = '<button class="btn bp" onclick="lyReading()">排盘解卦</button><button class="btn bg" onclick="lyUndo()">撤回</button><button class="btn bg" onclick="lyReset()">重来</button>';
    }
  }
  document.getElementById("ly_load").style.display = lyPhase === "reading" ? "block" : "none";
}

function lyDoToss() {
  if (lyLines.length >= 6 || lyTossing) return;
  lyTossing = true;
  var ca = document.getElementById("ly_coins");
  ca.style.display = "flex";
  var n = 0;
  var id = setInterval(function() {
    var html = "";
    for (var i = 0; i < 3; i++) {
      var z = Math.random() < 0.5;
      html += '<div class="coin ' + (z ? 'z' : 'b') + '">' + (z ? '字' : '背') + '</div>';
    }
    ca.innerHTML = html;
    n++;
    if (n >= 8) clearInterval(id);
  }, 80);
  setTimeout(function() {
    var val = [0,0,0].map(function() { return Math.random() < 0.5 ? 2 : 3; }).reduce(function(a,b){return a+b;}, 0);
    lyLines.push(val);
    lyTossing = false;
    ca.style.display = "none";
    lyRender();
  }, 700);
  lyRender();
}

function lyUndo() { if (lyLines.length > 0 && !lyTossing) { lyLines.pop(); lyRender(); } }
function lyReset() { lyLines = []; lyPhase = "input"; document.getElementById("ly_result").style.display = "none"; lyRender(); }

function lyReading() {
  lyPhase = "reading"; lyRender(); lyUpdateGZ();
  setTimeout(function() {
    var text = lyBuildResult();
    lyPhase = "done";
    var ra = document.getElementById("ly_result");
    ra.style.display = "block";
    ra.innerHTML = '<div class="rd">' + md2html(text) + '<div class="br"><button class="btn bp" onclick="lyAIRead()">🤖 AI深度解读</button><button class="btn bg" style="border-color:var(--g);color:var(--g)" onclick="lyReset()">再占一卦</button></div></div>';
    _lastLyText = text;
    lyRender();
    ra.scrollIntoView({behavior:"smooth"});
  }, 800);
}

function getLQ(gw, yw) {
  if (gw === yw) return "兄弟";
  if (WXS[gw] === yw) return "子孙";
  if (WXS[yw] === gw) return "父母";
  if (WXK[gw] === yw) return "妻财";
  if (WXK[yw] === gw) return "官鬼";
  return "?";
}

function lyBuildResult() {
  var rg = window._rg || "甲", rz = window._rz || "子", yz = window._yz || "子";
  var bb = lyLines.map(gBase), cb = lyLines.map(gChg);
  var bk = bb.join(""), ck = cb.join("");
  var ik = bk.slice(0,3), ok = bk.slice(3,6);
  var ig = BAGUA[ik], og = BAGUA[ok];
  var BGT = getBGT();
  var gi = BGT[bk] || {gong: ig.n, shi:4, ying:1};
  var gpk = ""; for (var k in BAGUA) { if (BAGUA[k].n === gi.gong) { gpk = k; break; } }
  var gw = BAGUA[gpk] ? BAGUA[gpk].wx : "土";

  var LSORD = ["青龙","朱雀","勾陈","螣蛇","白虎","玄武"];
  var lst = {甲:0,乙:0,丙:1,丁:1,戊:2,己:3,庚:4,辛:4,壬:5,癸:5};
  var ci = []; lyLines.forEach(function(v,i){ if(isDong(v)) ci.push(i); });

  // Build yaos
  var yaos = [];
  for (var i = 0; i < 6; i++) {
    var inn = i < 3;
    var gu = inn ? ig : og;
    var gn = gu.n;
    var li = inn ? i : i - 3;
    var tg = inn ? gu.ty : gu.iy;
    var da = inn ? NJD[gn].i : NJD[gn].o;
    var dz = da[li];
    var dw = WX_D[dz];
    yaos.push({ pn: YP[i], tg: tg, dz: dz, wx: dw, lq: getLQ(gw, dw), shi: i === gi.shi, ying: i === gi.ying, dong: isDong(lyLines[i]), ls: LSORD[(lst[rg] + i) % 6] });
  }

  // 空亡
  var ti = TG.indexOf(rg), di = DZ.indexOf(rz);
  var df = di - ti; if (df < 0) df += 12;
  var xs = (di - df + 120) % 12;
  var kw = [DZ[(xs + 10) % 12], DZ[(xs + 11) % 12]];
  yaos.forEach(function(y) { y.kong = kw.indexOf(y.dz) >= 0; });

  // 变卦
  var cYaos = null;
  if (ci.length > 0) {
    var cik = ck.slice(0,3), cok = ck.slice(3,6);
    cYaos = [];
    for (var i = 0; i < 6; i++) {
      var inn = i < 3;
      var gu = inn ? BAGUA[cik] : BAGUA[cok];
      var gn = gu.n, li = inn ? i : i - 3;
      var tg = inn ? gu.ty : gu.iy;
      var da = inn ? NJD[gn].i : NJD[gn].o;
      var dz = da[li], dw = WX_D[dz];
      cYaos.push({ tg: tg, dz: dz, wx: dw, lq: getLQ(gw, dw) });
    }
  }

  var gn = HT[bk] || "?";
  var cgn = ci.length > 0 ? (HT[ck] || "?") : "";

  var t = "## " + gi.gong + "宫 · " + gn + "卦" + (gi.yh ? "（游魂）" : "") + (gi.gh ? "（归魂）" : "") + "\n\n";
  t += og.n + "（" + og.wx + "）上 · " + ig.n + "（" + ig.wx + "）下　宫属" + gw + "\n";
  t += "日建" + rg + rz + "　月建" + yz + "月　空亡" + kw.join("·") + "\n";
  if (ci.length > 0) t += "\n**" + gn + " → " + cgn + "**　动爻：" + ci.map(function(i){return YP[i]+"爻";}).join("、") + "\n";

  t += "\n## 排盘\n\n";
  for (var i = 5; i >= 0; i--) {
    var y = yaos[i];
    var sy = y.shi ? "**世**" : (y.ying ? "**应**" : "");
    var dm = y.dong ? "○" : "";
    var km = y.kong ? "⊘" : "";
    var cv = "";
    if (y.dong && cYaos) {
      var c = cYaos[i];
      cv = "→ " + c.lq + " " + c.tg + c.dz + "（" + c.wx + "）";
    }
    t += y.ls + "　" + y.lq + "　" + y.tg + y.dz + "（" + y.wx + "）" + dm + "　" + sy + km + "　" + cv + "\n";
  }

  // 动变分析
  if (ci.length > 0) {
    t += "\n## 动变分析\n\n";
    ci.forEach(function(idx) {
      var by = yaos[idx], cy = cYaos[idx];
      var bw = by.wx, cw = cy.wx;
      var rel = "";
      if (bw === cw) rel = "化比和";
      else if (WXS[bw] === cw) rel = "化泄";
      else if (WXS[cw] === bw) rel = "化回头生✦";
      else if (WXK[bw] === cw) rel = "化克出";
      else if (WXK[cw] === bw) rel = "化回头克⚠";
      t += "**" + by.pn + "爻**：" + by.lq + by.tg + by.dz + "（" + bw + "）→ " + cy.lq + cy.tg + cy.dz + "（" + cw + "）" + rel + "\n";
    });
  }

  // 用神
  var q = document.getElementById("ly_q").value;
  t += "\n## 用神分析\n\n";
  var ys = "官鬼";
  if (/财|钱|利润|业绩|收入/.test(q)) ys = "妻财";
  else if (/考|学|文书|合同/.test(q)) ys = "父母";
  else if (/子|孩/.test(q)) ys = "子孙";
  var ysY = yaos.filter(function(y) { return y.lq === ys; });
  if (ysY.length > 0) {
    ysY.forEach(function(y) {
      t += "用神" + y.lq + y.tg + y.dz + "（" + y.wx + "）在" + y.pn + "爻" + (y.shi ? "（世）" : "") + (y.ying ? "（应）" : "") + (y.kong ? " 旬空" : "") + (y.dong ? " 动爻" : "") + "\n";
    });
  } else {
    t += "用神" + ys + "不上卦，需查伏神。\n";
  }

  // 世应
  var sh = yaos.filter(function(y){return y.shi;})[0];
  var yi = yaos.filter(function(y){return y.ying;})[0];
  if (sh) t += "\n**世爻**：" + sh.lq + sh.tg + sh.dz + "（" + sh.wx + "）" + (sh.kong ? "旬空" : "") + "\n";
  if (yi) t += "**应爻**：" + yi.lq + yi.tg + yi.dz + "（" + yi.wx + "）\n";
  if (sh && yi) {
    var sw = sh.wx, yw = yi.wx;
    if (sw === yw) t += "世应比和，双方势均力敌。\n";
    else if (WXS[sw] === yw) t += "世生应，我方主动付出。\n";
    else if (WXS[yw] === sw) t += "应生世，对方有利于我。\n";
    else if (WXK[sw] === yw) t += "世克应，我方占优。\n";
    else if (WXK[yw] === sw) t += "应克世，对方给我压力。\n";
  }

  // ═══ 经典文献引用 ═══
  if (typeof GAODAO !== "undefined") {
    var gd = GAODAO[bk];
    if (gd) {
      t += "\n## 高岛易断\n\n";
      t += "**【卦断】** " + gd.judgment + "\n\n";
      if (gd.yao && gd.yao[0].indexOf("从略") === -1) {
        t += "**【爻断】**\n";
        lyLines.forEach(function(v, i) {
          var marker = isDong(v) ? " ★" : "";
          t += YP[i] + "爻" + marker + "：" + gd.yao[i] + "\n";
        });
      }
    }
  }

  if (typeof JIAOSHI !== "undefined" && ci.length > 0) {
    var jsBen = JIAOSHI[bk];
    if (jsBen && jsBen[ck]) {
      t += "\n## 焦氏易林\n\n";
      t += "**" + (HT[bk]||"?") + "之" + (HT[ck]||"?") + "**：" + jsBen[ck] + "\n";
    }
  }

  if (typeof HUANGJINCE !== "undefined") {
    t += "\n## 黄金策断语\n\n";

    // 1. 先按问事关键词匹配
    var q2 = document.getElementById("ly_q").value;
    var hjKeys = [];
    if (/财|钱|利润|业绩|收入|投资|买|卖|生意/.test(q2)) hjKeys.push("求财");
    if (/工作|事业|升|职|官|公司|项目|晋/.test(q2)) hjKeys.push("事业");
    if (/婚|恋|感情|对象|桃花|夫|妻|男友|女友/.test(q2)) hjKeys.push("婚姻");
    if (/病|健康|身体|医|治|手术/.test(q2)) hjKeys.push("疾病");
    if (/出行|旅|行程|出差|飞|去/.test(q2)) hjKeys.push("出行");
    if (/诉|官司|纠纷|打官司|法/.test(q2)) hjKeys.push("诉讼");

    // 2. 若未匹配到，根据卦象六亲持世自动推断
    if (hjKeys.length === 0) {
      var shiY = yaos.filter(function(y){return y.shi;})[0];
      if (shiY) {
        if (shiY.lq === "妻财") hjKeys.push("求财");
        else if (shiY.lq === "官鬼") hjKeys.push("事业");
        else if (shiY.lq === "父母") hjKeys.push("事业");
        else if (shiY.lq === "子孙") hjKeys.push("求财"); // 子孙生财
        else if (shiY.lq === "兄弟") hjKeys.push("求财"); // 兄弟劫财需看
      }
    }

    // 3. 无论如何至少显示一个分类
    if (hjKeys.length === 0) hjKeys.push("求财");

    // 4. 输出匹配到的分类断语 + 结合卦象的具体应用
    hjKeys.forEach(function(hjKey) {
      if (HUANGJINCE[hjKey]) {
        t += "**【" + hjKey + "】**\n" + HUANGJINCE[hjKey] + "\n\n";

        // 5. 结合卦象给出黄金策对应的具体判断
        t += "**【本卦对照】** ";
        var shiY = yaos.filter(function(y){return y.shi;})[0];
        var dongYaos = yaos.filter(function(y){return y.dong;});

        if (hjKey === "求财") {
          var caiYao = yaos.filter(function(y){return y.lq==="妻财";});
          var xiongYao = yaos.filter(function(y){return y.lq==="兄弟";});
          var ziYao = yaos.filter(function(y){return y.lq==="子孙";});
          if (caiYao.length > 0) {
            var cy = caiYao[0];
            t += "妻财" + cy.tg + cy.dz + "在" + cy.pn + "爻";
            if (cy.shi) t += "持世，利于求财";
            else if (cy.ying) t += "临应，财在他处";
            if (cy.dong) t += "，财爻发动主财来";
            if (cy.kong) t += "，但旬空——财虚不实";
            t += "。";
          } else {
            t += "妻财不上卦，求财费力。";
          }
          var dongXiong = xiongYao.filter(function(y){return y.dong;});
          if (dongXiong.length > 0) t += "兄弟发动，「劫夺之忧」，防破财竞争。";
          var dongZi = ziYao.filter(function(y){return y.dong;});
          if (dongZi.length > 0) t += "子孙发动，「财源滚滚」，原神动生财，吉。";
          t += "\n";
        }

        else if (hjKey === "事业") {
          var guanYao = yaos.filter(function(y){return y.lq==="官鬼";});
          var fuYao = yaos.filter(function(y){return y.lq==="父母";});
          if (guanYao.length > 0) {
            var gy = guanYao[0];
            t += "官鬼" + gy.tg + gy.dz + "在" + gy.pn + "爻";
            if (gy.shi) t += "持世，「有职权在握之象」";
            if (gy.dong) t += "，官星发动主变动升迁";
            if (gy.kong) t += "，但旬空——职位虚悬";
            t += "。";
          } else {
            t += "官鬼不上卦，事业动力不足。";
          }
          if (shiY && shiY.lq === "子孙") t += "子孙持世，「不利求官」——子孙克官鬼。";
          t += "\n";
        }

        else if (hjKey === "婚姻") {
          if (shiY) {
            var hunYS = shiY.lq;
            t += "世爻" + shiY.lq + "持世。";
            var yingY = yaos.filter(function(y){return y.ying;})[0];
            if (yingY) {
              var sw = shiY.wx, yw = yingY.wx;
              if (WXS[sw] === yw || WXS[yw] === sw) t += "世应相生，「婚姻可成」。";
              else if (WXK[sw] === yw || WXK[yw] === sw) t += "世应相克，「必有阻碍」。";
              else if (sw === yw) t += "世应比和，双方条件相当。";
            }
          }
          t += "\n";
        }

        else if (hjKey === "疾病") {
          var bingYao = yaos.filter(function(y){return y.lq==="官鬼";});
          var yiYao = yaos.filter(function(y){return y.lq==="子孙";});
          if (bingYao.length > 0) {
            var by = bingYao[0];
            t += "官鬼" + by.tg + by.dz + "为病症";
            if (by.dong) t += "，发动克世，病情来势凶猛";
            t += "。";
          }
          if (yiYao.length > 0) {
            var yy = yiYao[0];
            t += "子孙" + yy.tg + yy.dz + "为医药";
            if (yy.dong) t += "，发动制鬼，「药到病除」";
            else t += "，安静不动，医药效果待验";
            t += "。";
          }
          t += "\n";
        }

        else {
          t += "世爻" + (shiY ? shiY.lq + shiY.tg + shiY.dz : "不明") + "。";
          if (dongYaos.length > 0) {
            t += "动爻" + dongYaos.map(function(y){return y.lq+y.tg+y.dz;}).join("、") + "发动，主事有变。";
          }
          t += "\n";
        }
      }
    });
  }

  t += "\n---\n";
  return t;
}

function doBazi() {
  var v = document.getElementById("bz_date").value;
  if (!v) { alert("请选择出生日期"); return; }
  var parts = v.split("-").map(Number);
  var y = parts[0], m = parts[1], d = parts[2];

7. 十二长生状态（长生、沐浴、冠带、临官、帝旺、衰、病、死、墓、绝、胎、养）辅助判断各五行在不同地支的实际力量。\n\
\n\
【论命风格要求】\n\
- 你像一位德高望重的命理前辈，分析层层递进、逻辑严密\n\
- 先论格局，再论喜忌，后论大运流年，最后给建议\n\
- 每个论断都要交代推理过程，不空口说白话\n\
- 性格分析要结合十神组合的具体含义，不泛泛而谈\n\
- 大运分析要每步运都点评，当前运和近几年要重点展开\n\
- 给出具体的趋吉避凶建议：方位、颜色、行业、贵人属相等\n\
- 回答不少于1500字，结构清晰";

var PROMPT_HUANGLI = "你是一位精通中国传统择日学的资深择日师，熟读《协纪辨方书》《玉匣记》《象吉通书》《择日精粹》等典籍。\n\
\n\
你的任务是根据用户提供的黄历信息，给出当天的详细择日分析和行事指导。\n\
\n\
【你必须包含的分析内容】\n\
1. 日辰总论：当日天干地支的五行属性、气场特征。\n\

3. 二十八宿值日分析：当天值日星宿的吉凶性质和适宜之事。\n\
4. 吉神方位详解：喜神、财神、福神方位的具体应用建议（面朝哪个方向办公、出行先往哪个方向等）。\n\
5. 冲煞详解：冲什么生肖、煞在什么方位，这些生肖的人今天要注意什么。\n\

8. 特定人群提醒：对做生意的人、学生、上班族、老人等不同人群分别给出当天建议。\n\

【风格要求】\n\

// 保存最后一次各模块的结果文本
var _lastLyText = "";
var _lastBzText = "";
var _lastHlText = "";

function getConfig() {
  return {
    endpoint: localStorage.getItem("yj_ep") || "",
    apiKey: localStorage.getItem("yj_key") || "",
    model: localStorage.getItem("yj_model") || "claude-sonnet-4-20250514",
    provider: localStorage.getItem("yj_provider") || "anthropic"
  };
}

function callLLM(systemPrompt, userContent, callback) {
  var cfg = getConfig();

  // Mode 1: Worker backend
  if (cfg.endpoint) {
    fetch(cfg.endpoint, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        systemPrompt: systemPrompt,
        hexagramData: { panText: userContent },
        question: userContent
      })
    }).then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.error) throw new Error(data.error);
      callback(null, data.reading || "未获取到解读。");
    }).catch(function(e) { callback(e.message, null); });
    return;
  }

  // Mode 2: Direct API call (key in browser)
  if (!cfg.apiKey) {
    callback("未配置API。请点击右下角⚙设置API密钥或后端地址。", null);
    return;
  }

  var provider = cfg.provider;
  var model = cfg.model;
  var url, headers, body;

  if (provider === "anthropic") {
    url = "https://api.anthropic.com/v1/messages";
    headers = {"Content-Type":"application/json", "x-api-key": cfg.apiKey, "anthropic-version":"2023-06-01"};
    body = JSON.stringify({model: model, max_tokens: 4096, system: systemPrompt, messages: [{role:"user", content: userContent}]});
  } else {
    // OpenAI / OpenRouter compatible
    url = provider === "openrouter" ? "https://openrouter.ai/api/v1/chat/completions" : "https://api.openai.com/v1/chat/completions";
    headers = {"Content-Type":"application/json", "Authorization": "Bearer " + cfg.apiKey};
    body = JSON.stringify({model: model, max_tokens: 4096, messages: [{role:"system", content: systemPrompt}, {role:"user", content: userContent}]});
  }

  fetch(url, {method:"POST", headers: headers, body: body})
  .then(function(res) { return res.text(); })
  .then(function(raw) {
    var data = JSON.parse(raw);
    var text = "";
    if (data.content && Array.isArray(data.content)) {
      // Anthropic format
      data.content.forEach(function(b) { if (b.type === "text") text += b.text; });
    } else if (data.choices && data.choices[0]) {
      // OpenAI format
      text = data.choices[0].message.content;
    } else if (data.error) {
      throw new Error(data.error.message || JSON.stringify(data.error));
    }
    if (!text) throw new Error("Empty response");
    callback(null, text);
  }).catch(function(e) { callback(e.message, null); });
}

// Shared: render AI result into a target div
function renderAIResult(targetId, loadingText) {
  var el = document.getElementById(targetId);
  el.innerHTML = '<div style="text-align:center;padding:20px 0"><div class="sp"></div><div style="color:var(--t2);font-size:12px">' + (loadingText || '卦师正在解读…') + '</div></div>';
  el.style.display = "block";
}

function renderAIDone(targetId, text, err) {
  var el = document.getElementById(targetId);
  if (err) {
    el.innerHTML = '<div class="rd" style="border-color:#5a3025"><h2 style="color:#e8a088">AI解读失败</h2><p style="color:#e8a088;font-size:12px">' + err + '</p><p style="font-size:11px;color:var(--t3)">请检查⚙设置中的API密钥或后端地址是否正确。</p></div>';
  } else {
    el.innerHTML = '<div class="rd">' + md2html(text) + '</div>';
  }
  el.scrollIntoView({behavior:"smooth"});
}

function lyAIRead() {
  if (!_lastLyText) { alert("请先完成摇卦排盘"); return; }

function saveCfg() {
  localStorage.setItem("yj_ep", document.getElementById("cfgEp").value.trim());
  localStorage.setItem("yj_key", document.getElementById("cfgKey").value.trim());
  localStorage.setItem("yj_model", document.getElementById("cfgModel").value.trim() || "claude-sonnet-4-20250514");
  localStorage.setItem("yj_provider", document.getElementById("cfgProv").value);
  document.getElementById("cfgP").style.display = "none";
  alert("设置已保存");
}
function openCfg() {
  var p = document.getElementById("cfgP");
  var isOpen = p.style.display === "block";
  p.style.display = isOpen ? "none" : "block";
  if (!isOpen) {
    document.getElementById("cfgEp").value = localStorage.getItem("yj_ep") || "";
    document.getElementById("cfgKey").value = localStorage.getItem("yj_key") || "";
    document.getElementById("cfgModel").value = localStorage.getItem("yj_model") || "claude-sonnet-4-20250514";
    document.getElementById("cfgProv").value = localStorage.getItem("yj_provider") || "anthropic";
  }
}
